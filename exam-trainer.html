<style>
  :root{

    --gold:#d97706; --line:#e3e7f2; --soft:#eef2fb;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--ink); font-size:16px;}
  .wrap{max-width:640px; margin:0 auto; padding:12px 14px 90px;}
  header{display:flex; align-items:center; justify-content:space-between; padding:10px 2px;}
  header h1{font-size:18px; margin:0; font-weight:700;}
  .daysleft{font-size:13px; color:var(--muted); text-align:right; line-height:1.3;}
  .daysleft b{color:var(--accent); font-size:16px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:16px; margin:10px 0; box-shadow:0 1px 3px rgba(30,40,80,.05);}
  .card h2{font-size:16px; margin:0 0 10px;}
  .muted{color:var(--muted); font-size:13.5px;}
  .small{font-size:12.5px;}
  button{font-family:inherit; font-size:15px; border:none; border-radius:10px;
    padding:11px 16px; cursor:pointer; background:var(--accent); color:#fff; font-weight:600;}
  button:active{transform:scale(.98);}
  button.sec{background:var(--soft); color:var(--accent);}
  button.ghost{background:transparent; color:var(--muted); font-weight:500;}
  button.opt{display:block; width:100%; text-align:left; background:var(--soft);
    color:var(--ink); font-weight:500; margin:6px 0; padding:12px 14px; line-height:1.35;}
  button.opt.right{background:#dcfce7; color:#14532d;}
  button.opt.wrong{background:#fee2e2; color:#7f1d1d;}
  button:disabled{opacity:.55; cursor:default;}
  .row{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .grow{flex:1;}
  nav{position:fixed; bottom:0; left:0; right:0; background:var(--card);
    border-top:1px solid var(--line); display:flex; justify-content:space-around;
    padding:6px 2px calc(8px + env(safe-area-inset-bottom));}
  nav button{background:none; color:var(--muted); font-size:10.5px; font-weight:600;
    padding:4px 6px; display:flex; flex-direction:column; align-items:center; gap:2px; border-radius:8px;}
  nav button .ic{font-size:20px; line-height:1;}
  nav button.on{color:var(--accent);}
  .greek{font-size:20px; font-weight:600; line-height:1.4;}
  .greektxt{font-size:17px; line-height:1.65; background:var(--soft); border-radius:10px;
    padding:14px; margin:10px 0; white-space:pre-wrap;}
  .translit{color:var(--gold); font-size:14.5px;}
  .badge{display:inline-block; background:var(--soft); color:var(--accent); border-radius:20px;
    padding:3px 10px; font-size:12px; font-weight:600; margin-right:6px;}
  .badge.done{background:#dcfce7; color:#14532d;}
  .task-item{display:flex; align-items:center; gap:12px; padding:12px 4px;
    border-bottom:1px solid var(--line);}
  .task-item:last-child{border-bottom:none;}
  .task-check{width:26px; height:26px; border-radius:50%; border:2px solid var(--line);
    display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0;}
  .task-check.done{background:var(--ok); border-color:var(--ok); color:#fff;}
  .progressbar{height:6px; background:var(--line); border-radius:3px; margin:8px 0;}
  .progressbar div{height:100%; background:var(--accent); border-radius:3px; transition:width .3s;}
  input[type=text],textarea{width:100%; font-family:inherit; font-size:16px; border:1.5px solid var(--line);
    border-radius:10px; padding:11px; background:#fff; color:var(--ink);}
  textarea{min-height:150px; line-height:1.5;}
  input:focus,textarea:focus{outline:none; border-color:var(--accent);}
  .diff{font-size:17px; line-height:1.6; letter-spacing:.5px;}
  .diff .g{color:var(--ok); font-weight:700;} .diff .b{color:var(--bad); font-weight:700; text-decoration:underline;}
  .statgrid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .statbox{background:var(--soft); border-radius:10px; padding:10px; text-align:center;}
  .statbox b{font-size:20px; display:block; color:var(--accent);}
  .timer{font-variant-numeric:tabular-nums; font-weight:700; font-size:18px; color:var(--accent);}
  .center{text-align:center;}
  .fireworks{font-size:40px; text-align:center; margin:8px 0;}
  .hidden{display:none;}
  .checkline{display:flex; gap:10px; align-items:flex-start; padding:7px 0; font-size:14.5px;}
  .phase-pill{background:linear-gradient(90deg,var(--accent),var(--accent2)); color:#fff;
    border-radius:10px; padding:10px 14px; font-size:14px; font-weight:600; margin:10px 0;}
</style>
</head>

{t:"Почему я учу греческий",sit:"Расскажи: сколько учишь язык, почему, что сложно, что легко, какие планы.",

/* ================= ДВИЖОК ================= */
const LS="a2trainer_v1";
const INTERVALS=[0,1,3,7,16];
const LABELS={vocab:"Слова",reading:"Чтение",listening:"Аудирование",grammar:"Грамматика",
  dictation:"Диктант",letter:"Письмо",speaking:"Говорение",mock:"Пробный экзамен"};
const ICONS={vocab:"🃏",reading:"📖",listening:"🎧",grammar:"✏️",dictation:"⌨️",
  letter:"✉️",speaking:"🗣️",mock:"🎓"};
const CYCLES={
 1:[["reading","grammar"],["listening","grammar"],["reading","dictation"],["listening","reading"]],
 2:[["listening","grammar"],["reading","letter"],["listening","dictation"],["speaking","grammar"],["reading","listening"],["letter","dictation"]],
 3:[["listening","speaking"],["reading","letter"],["grammar","dictation"],["speaking","listening"],["letter","grammar"],["reading","dictation"]],
 4:[["mock"],["listening","speaking"],["mock"],["reading","grammar"],["mock"],["letter","speaking"]]};
const PHASE_NAMES={1:"Недели 1–2 · база: лексика, чтение, грамматика",
 2:"Недели 3–4 · подключаем аудирование и письмо",
 3:"Недели 5–6 · все четыре навыка каждый день",
 4:"Финиш · пробные экзамены и повторение"};

let S=load();
function load(){
  let s={};
  try{s=JSON.parse(localStorage.getItem(LS))||{};}catch(e){}
  s.examDate=s.examDate||"2026-09-01";
  s.start=s.start||todayStr();
  s.vocab=s.vocab||{}; s.days=s.days||{}; s.stats=s.stats||{};
  s.rate=s.rate||0.9; s.mockN=s.mockN||0;
  return s;
}
function save(){localStorage.setItem(LS,JSON.stringify(S));}
function todayStr(d){d=d||new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function dayDiff(a,b){return Math.round((new Date(b)-new Date(a))/864e5);}
function daysLeft(){return dayDiff(todayStr(),S.examDate);}
function dayNum(){return Math.max(0,dayDiff(S.start,todayStr()));}
function phase(){const d=daysLeft(); if(d>42)return 1; if(d>28)return 2; if(d>14)return 3; return 4;}
function todayTasks(){
  const c=CYCLES[phase()]; return ["vocab"].concat(c[dayNum()%c.length]);
}
function poolIdx(type){
  const pools={reading:READING.length,listening:LISTENING.length,grammar:5,
    dictation:6,letter:LETTERS.length,speaking:SPEAKING.length};
  return dayNum()%(pools[type]||1);
}
function markDone(type){
  const t=todayStr(); S.days[t]=S.days[t]||{}; S.days[t][type]=true; save();
}
function isDone(type){const d=S.days[todayStr()]; return !!(d&&d[type]);}
function addStat(type,ok,total){
  S.stats[type]=S.stats[type]||{ok:0,total:0};
  S.stats[type].ok+=ok; S.stats[type].total+=total; save();
}
function streak(){
  let n=0,d=new Date();
  const did=k=>{const x=S.days[k];return x&&Object.keys(x).length>=2;};
  if(!did(todayStr(d))) d.setDate(d.getDate()-1);
  while(did(todayStr(d))){n++;d.setDate(d.getDate()-1);}
  return n;
}
/* ---------- TTS ---------- */
let voiceEl=null;
function findVoice(){
  const v=speechSynthesis.getVoices().filter(x=>x.lang&&x.lang.toLowerCase().startsWith("el"));
  voiceEl=v[0]||null; return voiceEl;
}
if("speechSynthesis" in window){speechSynthesis.onvoiceschanged=findVoice; findVoice();}
function speak(text,rate){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="el-GR"; if(voiceEl)u.voice=voiceEl; u.rate=rate||S.rate;
  speechSynthesis.speak(u);
}
function speakLines(lines,rate){
  speechSynthesis.cancel();
  lines.forEach((ln,i)=>{
    const u=new SpeechSynthesisUtterance(ln);
    u.lang="el-GR"; if(voiceEl)u.voice=voiceEl; u.rate=rate||S.rate;
    speechSynthesis.speak(u);
  });
}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");}
function norm(s){return s.toLowerCase().replace(/[.,;·!?«»";]/g,"").replace(/\s+/g," ").trim();}
function deacc(s){return s.normalize("NFD").replace(/[̀-ͯ]/g,"");}

/* ---------- Навигация ---------- */
const V=document.getElementById("view");
let TAB="today";
const NAVS=[["today","🏠","Сегодня"],["vocab","🃏","Слова"],["skills","🎯","Навыки"],["exam","🎓","Экзамен"],["more","⚙️","Ещё"]];
function renderNav(){

   `<button class="${TAB===n[0]?'on':''}" onclick="APP.go('${n[0]}')"><span class="ic">${n[1]}</span>${n[2]}</button>`).join("");
}
function go(tab){TAB=tab; speechSynthesis.cancel(); render(); window.scrollTo(0,0);}
function render(){

  ({today:renderToday,vocab:vocabHome,skills:skillsHome,exam:examHome,more:moreHome})[TAB]();
}
function renderHeader(){
  const d=daysLeft();
  document.getElementById("hDays").innerHTML=
    d>0?`до экзамена<br><b>${d} ${plural(d,"день","дня","дней")}</b>`:
    d===0?"<b>Экзамен сегодня! Καλή επιτυχία! 🍀</b>":"экзамен прошёл 🎉";
}
function plural(n,a,b,c){n=Math.abs(n)%100;const m=n%10;
  if(n>10&&n<20)return c; if(m>1&&m<5)return b; if(m===1)return a; return c;}

/* ---------- Сегодня ---------- */
function renderToday(){
  const tasks=todayTasks(), st=streak();
  const doneCnt=tasks.filter(isDone).length;
  V.innerHTML=`
  <div class="phase-pill">${PHASE_NAMES[phase()]}</div>
  <div class="card">
    <div class="row"><h2 class="grow">План на сегодня</h2>
      <span class="badge">🔥 ${st} ${plural(st,"день","дня","дней")}</span></div>
    <div class="progressbar"><div style="width:${100*doneCnt/tasks.length}%"></div></div>
    ${tasks.map(t=>`
      <div class="task-item">
        <div class="task-check ${isDone(t)?'done':''}">${isDone(t)?"✓":""}</div>
        <div class="grow"><b>${ICONS[t]} ${LABELS[t]}</b>
          <div class="muted small">${taskHint(t)}</div></div>
        <button class="${isDone(t)?'sec':''}" onclick="APP.start('${t}')">${isDone(t)?"Ещё раз":"Начать"}</button>
      </div>`).join("")}
    ${doneCnt===tasks.length?'<div class="fireworks">🎉 День закрыт! Μπράβο σου!</div>':""}
  </div>
  <div class="card muted small">Слова — каждый день. Остальные блоки чередуются по фазам подготовки.
  Ближе к экзамену появятся пробные мини-экзамены. Дату экзамена можно изменить во вкладке «Ещё».</div>`;
}
function taskHint(t){
  const i=poolIdx(t);
  return {vocab:"повторение + новые слова (~10 мин)",
    reading:"«"+(READING[i]?READING[i].t:"")+"» + вопросы",
    listening:"диалог «"+(LISTENING[i]?LISTENING[i].t:"")+"» на слух",
    grammar:"8 заданий экзаменационного формата",
    dictation:"4 предложения под диктовку",
    letter:LETTERS[i]?LETTERS[i].task.slice(0,60)+"…":"",
    speaking:"«"+(SPEAKING[i]?SPEAKING[i].t:"")+"» — говори вслух!",
    mock:"мини-экзамен: все 4 навыка, ~25 минут"}[t]||"";
}
function start(t){
  if(t==="vocab")return vocabSession();
  if(t==="reading")return readingSession(poolIdx(t),true);
  if(t==="listening")return listeningSession(poolIdx(t),true);
  if(t==="grammar")return grammarSession(dayNum()*8,true);
  if(t==="dictation")return dictationSession(dayNum()*4,true);
  if(t==="letter")return letterSession(poolIdx(t),true);
  if(t==="speaking")return speakingSession(poolIdx(t),true);
  if(t==="mock")return mockStart();
}

/* ---------- Слова (Лейтнер) ---------- */
let VQ=null;
function vocabDue(){
  const t=todayStr();
  return VOCAB.filter(w=>{
    const st=S.vocab[w[0]];
    return st&&st.due<=t;
  });
}
function vocabNew(n){
  return VOCAB.filter(w=>!S.vocab[w[0]]).slice(0,n);
}
function vocabHome(){
  const due=vocabDue().length, fresh=VOCAB.filter(w=>!S.vocab[w[0]]).length;
  const learned=VOCAB.filter(w=>S.vocab[w[0]]&&S.vocab[w[0]].box>=3).length;
  V.innerHTML=`
  <div class="card"><h2>🃏 Экзаменационная лексика A2</h2>
    <div class="statgrid">
      <div class="statbox"><b>${due}</b><span class="muted small">к повторению</span></div>
      <div class="statbox"><b>${fresh}</b><span class="muted small">новых осталось</span></div>
      <div class="statbox"><b>${learned}</b><span class="muted small">выучено (уровень 3+)</span></div>
      <div class="statbox"><b>${VOCAB.length}</b><span class="muted small">всего слов</span></div>
    </div>
    <div style="margin-top:12px"><button onclick="APP.vocabSession()">Начать сессию</button></div>
  </div>
  <div class="card muted small">Система Лейтнера: интервалы 0/1/3/7/16 дней. Новые слова — карточки,
  затем выбор перевода, на верхних уровнях — ввод по-гречески. Тот же принцип, что в твоём словарном тренажёре.</div>`;
}
function vocabSession(){
  const due=vocabDue(), fresh=vocabNew(6);
  VQ={queue:due.concat(fresh),i:0,ok:0,total:due.length+fresh.length};
  if(!VQ.queue.length){V.innerHTML=`<div class="card center"><h2>Всё повторено! 🎉</h2>
    <p class="muted">Новых слов нет, повторения будут завтра.</p>
    <button onclick="APP.go('today')">К плану</button></div>`;return;}
  vocabCard();
}
function vocabCard(){
  if(VQ.i>=VQ.queue.length)return vocabEnd();
  const w=VQ.queue[VQ.i], st=S.vocab[w[0]]||{box:0}, box=st.box||0;
  const head=`<div class="row"><span class="badge">слово ${VQ.i+1}/${VQ.queue.length}</span>
    <span class="badge">уровень ${box}</span><span class="badge">${w[3]}</span></div>`;
  if(box<2){ /* карточка */
    V.innerHTML=`<div class="card center">${head}
      <p class="greek">${w[0]} <button class="ghost" onclick="APP.say(0)">🔊</button></p>
      <p class="translit">${w[1]}</p>
      <div id="ans" class="hidden"><p style="font-size:18px">${w[2]}</p>
        <div class="row" style="justify-content:center">
          <button class="sec" onclick="APP.vGrade(false)">Не помню</button>
          <button onclick="APP.vGrade(true)">Помню</button></div></div>
      <button id="show" onclick="APP.vShow()">Показать перевод</button></div>`;
    speak(w[0]);
  }else if(box===2){ /* выбор перевода */
    const opts=[w[2]];
    while(opts.length<4){const r=VOCAB[Math.floor(Math.random()*VOCAB.length)][2];
      if(!opts.includes(r))opts.push(r);}
    opts.sort(()=>Math.random()-.5);
    V.innerHTML=`<div class="card">${head}
      <p class="greek center">${w[0]} <button class="ghost" onclick="APP.say(0)">🔊</button></p>
      ${opts.map(o=>`<button class="opt" onclick="APP.vPick(this,'${esc(o).replace(/'/g,"\\'")}')">${o}</button>`).join("")}</div>`;
    speak(w[0]);
  }else{ /* ввод по-гречески */
    V.innerHTML=`<div class="card">${head}
      <p style="font-size:18px" class="center"><b>${w[2]}</b></p>
      <input type="text" id="inp" placeholder="Напиши по-гречески…" autocomplete="off">
      <div class="row" style="margin-top:10px">
        <button onclick="APP.vType()">Проверить</button>
        <button class="ghost" onclick="APP.vGrade(false)">Не знаю</button></div>
      <div id="fb"></div></div>`;
    document.getElementById("inp").focus();
  }
}
function vShow(){document.getElementById("ans").classList.remove("hidden");
  document.getElementById("show").classList.add("hidden");}
function vPick(btn,val){
  const w=VQ.queue[VQ.i], ok=val===w[2];
  btn.classList.add(ok?"right":"wrong");
  setTimeout(()=>vGrade(ok),700);
}
function vType(){
  const w=VQ.queue[VQ.i], inp=document.getElementById("inp").value;
  const a=norm(inp), b=norm(w[0]);
  let ok=a===b, almost=!ok&&deacc(a)===deacc(b);
  document.getElementById("fb").innerHTML=
    `<p style="margin-top:10px">${ok?"✅ Верно!":almost?"🟡 Почти — проверь ударения:":"❌ Правильно:"}
     <b class="greek" style="font-size:17px">${w[0]}</b></p>`;
  speak(w[0]);
  setTimeout(()=>vGrade(ok||almost),1400);
}
function vGrade(ok){
  const w=VQ.queue[VQ.i], st=S.vocab[w[0]]||{box:0};
  if(ok){st.box=Math.min(4,(st.box||0)+1); VQ.ok++;}
  else {st.box=0; VQ.queue.push(w);}
  const d=new Date(); d.setDate(d.getDate()+INTERVALS[st.box]);
  st.due=todayStr(d); S.vocab[w[0]]=st; save();
  VQ.i++; vocabCard();
}
function vocabEnd(){
  markDone("vocab"); addStat("vocab",VQ.ok,VQ.total);
  V.innerHTML=`<div class="card center"><h2>Сессия закончена!</h2>
    <p>Верно: <b>${VQ.ok}</b> из ${VQ.total}</p>
    <button onclick="APP.go('today')">К плану дня</button></div>`;
}
function say(i){const w=VQ.queue[VQ.i]; speak(w[0]);}

/* ---------- Чтение ---------- */
let Q=null;
function readingSession(idx,plan){
  const r=READING[idx%READING.length];
  Q={type:"reading",item:r,qi:0,ok:0,plan:plan,idx:idx};
  V.innerHTML=`<div class="card"><span class="badge">📖 ${r.t}</span>

function quiz(){
  const it=Q.item, q=it.qs[Q.qi];
  if(!q)return quizEnd();
  V.innerHTML=`<div class="card"><span class="badge">вопрос ${Q.qi+1}/${it.qs.length}</span>

    <p class="greek" style="font-size:17px">${q.q}</p>
    ${q.o.map((o,i)=>`<button class="opt" onclick="APP.pick(this,${i},${q.c})">${o}</button>`).join("")}

}
function pick(btn,i,c){
  document.querySelectorAll(".opt").forEach(b=>b.disabled=true);
  if(i===c){btn.classList.add("right");Q.ok++;}
  else{btn.classList.add("wrong");
    document.querySelectorAll(".opt")[c].classList.add("right");}
  setTimeout(()=>{Q.qi++;quiz();},900);
}
function quizEnd(){
  addStat(Q.type,Q.ok,Q.item.qs.length);
  if(Q.plan)markDone(Q.type);
  if(Q.mock)return mockNext(Q.ok,Q.item.qs.length);
  V.innerHTML=`<div class="card center"><h2>${Q.ok}/${Q.item.qs.length} верно ${Q.ok===Q.item.qs.length?"🎉":""}</h2>
    ${Q.type==="listening"?`<div class="greektxt" style="text-align:left">${Q.item.lines.join("\n")}</div>
      <p class="muted small">Прочитай диалог глазами и послушай ещё раз.</p>
      <button class="sec" onclick="APP.replay()">🔊 Слушать с текстом</button>`:""}

}
/* ---------- Аудирование ---------- */
let plays=0;
function listeningSession(idx,plan){
  const l=LISTENING[idx%LISTENING.length];

function playDlg(){

}

/* ---------- Диктант ---------- */
let D=null;
function dictationSession(seed,plan){
  const items=[0,1,2,3].map(i=>DICTATION[(seed+i)%DICTATION.length]);
  D={items:items,i:0,ok:0,plan:plan};
  dictCard();
}
function dictCard(){
  if(D.i>=D.items.length){
    addStat("dictation",D.ok,D.items.length);
    if(D.plan)markDone("dictation");
    V.innerHTML=`<div class="card center"><h2>Диктант: ${D.ok}/${D.items.length}</h2>
      <button onclick="APP.go('today')">К плану дня</button></div>`;return;}
  V.innerHTML=`<div class="card"><span class="badge">⌨️ предложение ${D.i+1}/${D.items.length}</span>
    <p class="muted">Прослушай и напиши. Ударения важны, но «почти» тоже засчитывается.</p>
    <div class="row"><button class="sec" onclick="APP.dictPlay()">🔊 Слушать</button>
    <button class="sec" onclick="APP.dictPlay(0.7)">🐢 Медленно</button></div>
    <div style="margin-top:10px"><input type="text" id="inp" autocomplete="off" placeholder="Πληκτρολόγησε εδώ…"></div>
    <div style="margin-top:10px"><button onclick="APP.dictCheck()">Проверить</button></div>
    <div id="fb"></div></div>`;
  setTimeout(()=>speak(D.items[D.i]),300);
}
function dictPlay(r){speak(D.items[D.i],r);}
function dictCheck(){
  const target=D.items[D.i], inp=document.getElementById("inp").value;
  const a=norm(inp), b=norm(target);
  const ok=a===b, almost=!ok&&deacc(a)===deacc(b);
  if(ok||almost)D.ok++;
  const wordsT=target.split(" ");
  const wordsA=norm(inp).split(" ");
  const diff=wordsT.map((w,i)=>{
    const wa=wordsA[i]||"";
    const good=norm(w)===wa||deacc(norm(w))===deacc(wa);
    return `<span class="${good?'g':'b'}">${w}</span>`;}).join(" ");
  document.getElementById("fb").innerHTML=
    `<p style="margin-top:12px">${ok?"✅ Отлично!":almost?"🟡 Почти! Проверь ударения:":"Правильный вариант:"}</p>
     <p class="diff">${diff}</p>
     <button onclick="APP.dictNext()">Дальше →</button>`;
}
function dictNext(){D.i++;dictCard();}
/* ---------- Грамматика ---------- */
let G=null;
function grammarSession(seed,plan){
  const items=[]; for(let i=0;i<8;i++)items.push(GRAMMAR[(seed+i)%GRAMMAR.length]);
  G={items:items,i:0,ok:0,plan:plan,mock:false};
  gCard();
}
function gCard(){
  if(G.i>=G.items.length){
    addStat("grammar",G.ok,G.items.length);
    if(G.plan)markDone("grammar");
    if(G.mock)return mockNext(G.ok,G.items.length);
    V.innerHTML=`<div class="card center"><h2>Грамматика: ${G.ok}/${G.items.length}</h2>
      <button onclick="APP.go('today')">К плану дня</button></div>`;return;}
  const it=G.items[G.i];
  V.innerHTML=`<div class="card"><span class="badge">✏️ ${G.i+1}/${G.items.length}</span>
    <p class="greek" style="font-size:18px">${it.q}</p>
    ${it.o.map((o,i)=>`<button class="opt" onclick="APP.gPick(this,${i})">${o}</button>`).join("")}
    <div id="fb"></div></div>`;
}
function gPick(btn,i){
  const it=G.items[G.i];
  document.querySelectorAll(".opt").forEach(b=>b.disabled=true);
  if(i===it.c){btn.classList.add("right");G.ok++;}
  else{btn.classList.add("wrong");document.querySelectorAll(".opt")[it.c].classList.add("right");}
  document.getElementById("fb").innerHTML=`<p class="muted small" style="margin-top:8px">💡 ${it.n}</p>
    <button onclick="APP.gNext()">Дальше →</button>`;
}
function gNext(){G.i++;gCard();}
/* ---------- Письмо ---------- */
let L=null;
function letterSession(idx,plan){
  const it=LETTERS[idx%LETTERS.length]; L={item:it,plan:plan,mock:false};
  V.innerHTML=`<div class="card"><span class="badge">✉️ Письмо</span>
    <p><b>${it.task}</b></p>
    <textarea id="txt" placeholder="Γράψε εδώ… (можно и на бумаге — как на экзамене)"></textarea>
    <p class="muted small">Слов: <span id="wc">0</span></p>
    <button onclick="APP.letterModel()">Готово → образец и чек-лист</button></div>`;
  document.getElementById("txt").addEventListener("input",e=>{
    document.getElementById("wc").textContent=e.target.value.trim()?e.target.value.trim().split(/\s+/).length:0;});
}
function letterModel(){
  const it=L.item;
  V.innerHTML=`<div class="card"><h2>Образец ответа</h2>
    <div class="greektxt">${it.model}</div>
    <button class="sec" onclick="APP.speakModel()">🔊 Прослушать</button>
    <h2 style="margin-top:14px">Проверь себя</h2>
    ${it.check.map(c=>`<label class="checkline"><input type="checkbox"> ${c}</label>`).join("")}
    <p class="muted small">Лучший вариант — принести своё письмо репетитору на разбор.</p>
    <button onclick="APP.letterDone()">Закончить</button></div>`;
}
function speakModel(){speak(L.item.model);}
function letterDone(){
  if(L.plan)markDone("letter");
  if(L.mock)return mockNext(null,null);
  go("today");
}
/* ---------- Говорение ---------- */
let SP=null,timerInt=null;
function speakingSession(idx,plan){
  const it=SPEAKING[idx%SPEAKING.length]; SP={item:it,plan:plan,mock:false};
  V.innerHTML=`<div class="card"><span class="badge">🗣️ ${it.t}</span>
    <p>${it.sit}</p>
    <p class="muted small">Вопросы экзаменатора (нажми 🔊, отвечай вслух):</p>
    ${it.qs.map((q,i)=>`<div class="row" style="padding:5px 0">
      <button class="ghost" onclick="APP.sayQ(${i})">🔊</button>
      <span class="greek" style="font-size:16px">${q}</span></div>`).join("")}
    <div class="row" style="margin-top:10px">
      <button class="sec" onclick="APP.timer(90)">⏱️ Таймер 90 сек</button>
      <span class="timer" id="tm"></span></div>
    <div style="margin-top:12px"><button onclick="APP.spkModel()">Показать образец</button></div></div>`;
}
function sayQ(i){speak(SP.item.qs[i]);}
function timer(sec){
  clearInterval(timerInt); let s=sec;
  const el=document.getElementById("tm"); el.textContent="1:30";
  timerInt=setInterval(()=>{s--;
    el.textContent=Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
    if(s<=0){clearInterval(timerInt);el.textContent="⏰ время!";}},1000);
}
function spkModel(){
  clearInterval(timerInt);
  const it=SP.item;
  V.innerHTML=`<div class="card"><h2>Образец ответа</h2>
    <div class="greektxt">${it.model}</div>
    <div class="row"><button class="sec" onclick="APP.spkPlay()">🔊 Прослушать</button>
    <button class="sec" onclick="APP.spkPlay(0.75)">🐢 Медленно</button></div>
    <p class="muted small" style="margin-top:8px">Повтори вслух за диктором 2–3 раза — это лучшая тренировка произношения.</p>
    <button onclick="APP.spkDone()">Закончить</button></div>`;
}
function spkPlay(r){speak(SP.item.model,r);}
function spkDone(){
  if(SP.plan)markDone("speaking");
  if(SP.mock)return mockNext(null,null);
  go("today");
}
/* ---------- Пробный экзамен ---------- */
let M=null;
function examHome(){
  V.innerHTML=`<div class="card"><h2>🎓 Пробный мини-экзамен</h2>
    <p class="muted">Формат как на экзамене A2: аудирование → чтение → грамматика → письмо → говорение.
    Около 25–30 минут. Аудирование — только на слух, максимум 3 прослушивания.</p>
    <p class="muted small">Пройдено пробных: <b>${S.mockN}</b></p>
    <button onclick="APP.mockStart()">Начать пробный экзамен</button></div>`;
}
function mockStart(){
  M={stage:0,score:0,total:0,n:S.mockN};
  mockStage();
}
function mockStage(){
  const n=M.n;
  if(M.stage===0){listeningSession(n%LISTENING.length,false);Q.mock=true;}
  else if(M.stage===1){readingSession((n+3)%READING.length,false);Q.mock=true;}
  else if(M.stage===2){grammarSession(n*6,false);G.items=G.items.slice(0,6);G.mock=true;}
  else if(M.stage===3){letterSession(n%LETTERS.length,false);L.mock=true;}
  else if(M.stage===4){speakingSession(n%SPEAKING.length,false);SP.mock=true;}
  else mockEnd();
}
function mockNext(ok,total){
  if(ok!==null){M.score+=ok;M.total+=total;}
  M.stage++;mockStage();
}
function mockEnd(){
  S.mockN++; markDone("mock"); save();
  const pct=M.total?Math.round(100*M.score/M.total):0;
  V.innerHTML=`<div class="card center"><h2>Пробный экзамен пройден! 🎓</h2>
    <p style="font-size:32px;font-weight:700;color:${pct>=60?"var(--ok)":"var(--bad)"}">${pct}%</p>
    <p class="muted">автопроверяемая часть (аудирование, чтение, грамматика): ${M.score}/${M.total}.
    Порог на экзамене обычно ~60%. Письмо и говорение оцени по чек-листам или с репетитором.</p>
    <button onclick="APP.go('today')">К плану дня</button></div>`;
}
/* ---------- Ещё ---------- */
function moreHome(){
  const rows=Object.keys(S.stats).map(k=>{
    const s=S.stats[k],p=s.total?Math.round(100*s.ok/s.total):0;
    return `<div class="task-item"><div class="grow">${ICONS[k]||""} ${LABELS[k]||k}</div>
      <b style="color:${p>=60?"var(--ok)":"var(--gold)"}">${p}%</b>
      <span class="muted small">(${s.ok}/${s.total})</span></div>`;}).join("");
  V.innerHTML=`
  <div class="card"><h2>📊 Точность по навыкам</h2>${rows||'<p class="muted">Пока нет данных.</p>'}</div>
  <div class="card"><h2>⚙️ Настройки</h2>
    <p class="small">Дата экзамена (точную пришлют на email до ~15 августа):</p>
    <input type="text" id="exd" value="${S.examDate}" placeholder="2026-09-01">
    <p class="small" style="margin-top:10px">Скорость озвучки: <span id="rv">${S.rate}</span></p>
    <input type="range" min="0.6" max="1.1" step="0.05" value="${S.rate}" style="width:100%"
      oninput="document.getElementById('rv').textContent=this.value" onchange="APP.setRate(this.value)">
    <div class="row" style="margin-top:10px">
      <button onclick="APP.saveSettings()">Сохранить</button>
      <button class="sec" onclick="APP.testVoice()">🔊 Тест голоса</button></div>
    <p class="muted small" id="vinfo" style="margin-top:8px"></p>
  </div>
  <div class="card"><h2>ℹ️ Об экзамене</h2>
    <p class="small">Экзамен A2 Школы греческого языка Университета Кипра: 1–18 сентября 2026, Никосия.
    Четыре части: аудирование, чтение, письмо (короткие тексты 80–100 слов), устная часть (беседа с экзаменатором).
    Вопросы: smgcertification@ucy.ac.cy · +357 22 892030.</p>
    <p class="small muted">Открытые образцы близкого формата: greek-language.gr/certification (уровень А2).</p></div>
  <div class="card"><button class="ghost" style="color:var(--bad)" onclick="APP.reset()">Сбросить весь прогресс</button></div>`;
  const v=findVoice();
  document.getElementById("vinfo").textContent=v?
    "Греческий голос: "+v.name:"⚠️ Греческий голос не найден — установи его в настройках устройства.";
}
function setRate(v){S.rate=parseFloat(v);save();}
function saveSettings(){
  const d=document.getElementById("exd").value.trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(d)){S.examDate=d;save();render();}
  else alert("Формат даты: 2026-09-05");
}
function testVoice(){speak("Γεια σου! Καλή επιτυχία στις εξετάσεις!");}
function reset(){
  if(confirm("Точно сбросить весь прогресс?")){localStorage.removeItem(LS);S=load();render();}
}
/* ---------- Экспорт и запуск ---------- */
const APP={go,start,vocabSession,vShow,vPick,vType,vGrade,say,quiz,pick,list,open,
  playDlg,replay,dictPlay,dictCheck,dictNext,gPick,gNext,letterModel,speakModel,letterDone,
  sayQ,timer,spkModel,spkPlay,spkDone,mockStart,setRate,saveSettings,testVoice,reset};
window.APP=APP;
render();
</script>
</body>
</html>
